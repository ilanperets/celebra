<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#faf6ef">
<title>celebra · ניהול אירועים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf6ef; --bg2:#f4ede1; --surface:#ffffff; --surface2:#fbf7f0; --surface3:#f6efe4;
  --ink:#332f28; --ink2:#766c5d; --ink3:#a89d8c;
  --line:#eee5d6; --line2:#e0d4c1;
  --gold:#bb8a30; --gold-d:#9a6c19; --gold-b:#a8791f; --gold-soft:#f8eed8; --gold-grad:linear-gradient(135deg,#d2a14a,#b07e23);
  --rose:#cf7f8a; --rose-soft:#fbe9ec; --rose-d:#b25e6a;
  --sage:#6f9e76; --sage-soft:#eaf2e9;
  --groom:#5f8bc0; --bride:#d086a4;
  --ok:#5fa06f; --ok-soft:#e8f1e9; --warn:#c2872c; --warn-soft:#f9eedb; --bad:#cf6f68; --bad-soft:#fbe7e5; --info:#5f8bc0; --info-soft:#e8eff5;
  --sh:0 2px 12px rgba(125,98,55,.07); --sh2:0 10px 30px -12px rgba(125,98,55,.22); --sh-gold:0 8px 22px -8px rgba(187,138,48,.5);
  --sb:282px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Heebo',sans-serif;font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#d0c2ab}::-webkit-scrollbar-track{background:transparent}
.serif{font-family:'Frank Ruhl Libre',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.hide{display:none!important}

/* ============ LOGIN ============ */
#login{position:fixed;inset:0;z-index:100;display:flex;
  background:
   radial-gradient(80% 60% at 85% 0%,rgba(207,127,138,.14),transparent 60%),
   radial-gradient(70% 60% at 10% 100%,rgba(187,138,48,.14),transparent 60%),
   var(--bg)}
.login-hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;overflow:hidden}
.login-hero .conf{position:absolute;inset:0;opacity:.5;pointer-events:none}
.login-hero .ht{position:relative;max-width:440px}
.login-hero .badge2{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--gold-d);box-shadow:var(--sh)}
.login-hero h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:48px;line-height:1.1;margin:22px 0 16px;color:var(--ink)}
.login-hero h1 b{color:var(--gold)}
.login-hero p{font-size:16px;color:var(--ink2);line-height:1.7;max-width:400px}
.login-hero .feats{display:flex;flex-direction:column;gap:12px;margin-top:30px}
.login-hero .feat{display:flex;align-items:center;gap:11px;font-size:14.5px;color:var(--ink);font-weight:500}
.login-hero .feat .fi{width:30px;height:30px;border-radius:9px;background:var(--gold-soft);color:var(--gold-d);display:flex;align-items:center;justify-content:center}
.login-hero .feat .fi svg{width:16px;height:16px}
.login-panel{width:480px;flex-shrink:0;background:var(--surface);box-shadow:-10px 0 40px -20px rgba(125,98,55,.3);display:flex;align-items:center;justify-content:center;padding:40px}
.login-form{width:100%;max-width:340px}
.brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:26px}
.brand .logo{width:40px;height:40px;border-radius:12px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--sh-gold)}
.brand .logo svg{width:23px;height:23px}
.brand .nm{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:25px}
.brand .nm b{color:var(--gold)}
.login-form h2{font-size:22px;font-weight:700;margin-bottom:5px}
.login-form .sub{color:var(--ink2);font-size:14px;margin-bottom:24px}
.in-grp{margin-bottom:15px}
.in-grp label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:7px}
.in-grp input{width:100%;background:var(--surface2);border:1.5px solid var(--line2);border-radius:12px;padding:13px 14px;color:var(--ink);font-size:15px;outline:none;transition:.15s}
.in-grp input:focus{border-color:var(--gold);background:var(--surface);box-shadow:0 0 0 3px var(--gold-soft)}
.login-btn{width:100%;background:var(--gold-grad);color:#fff;font-weight:700;font-size:15px;padding:14px;border-radius:12px;box-shadow:var(--sh-gold);transition:.15s;margin-top:6px}
.login-btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.login-err{background:var(--bad-soft);color:var(--bad);border:1px solid #f0c9c5;border-radius:10px;padding:10px 13px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.login-err.show{display:block}
.demo-box{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.demo-h{font-size:11px;letter-spacing:.12em;color:var(--ink3);font-weight:700;margin-bottom:11px;text-transform:uppercase}
.demo-chip{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px;text-align:right;transition:.15s}
.demo-chip:hover{border-color:var(--gold);background:var(--gold-soft)}
.demo-chip .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.demo-chip .di{flex:1}
.demo-chip .dn{font-weight:600;font-size:13px}
.demo-chip .dr{font-size:11px;color:var(--ink2)}
.demo-chip .dgo{font-size:11px;color:var(--gold-d);font-weight:700}

/* ============ APP SHELL ============ */
#app{display:flex;height:100vh}
.sidebar{width:var(--sb);flex-shrink:0;background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;height:100vh}
.sb-top{padding:20px 18px 15px;border-bottom:1px solid var(--line)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-brand .logo{width:36px;height:36px;border-radius:11px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--sh-gold)}
.sb-brand .logo svg{width:21px;height:21px}
.sb-brand .nm{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:21px}
.sb-brand .nm b{color:var(--gold)}
.event-pick{margin-top:14px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;transition:.15s}
.event-pick:hover{border-color:var(--gold);background:var(--gold-soft)}
.event-pick .lbl{font-size:10px;letter-spacing:.16em;color:var(--gold-d);font-weight:700;text-transform:uppercase}
.event-pick .row{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.event-pick .en{font-weight:700;font-size:14px}
.event-pick .ed{font-size:11.5px;color:var(--ink2);margin-top:1px}
.event-pick .ch{color:var(--ink3)}

.nav{flex:1;overflow-y:auto;padding:12px 11px}
.nav-sec{font-size:10px;letter-spacing:.14em;color:var(--ink3);font-weight:700;padding:13px 10px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--ink2);font-weight:500;font-size:14px;cursor:pointer;transition:.13s;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--surface3);color:var(--ink)}
.nav-item.on{background:var(--gold-soft);color:var(--gold-d);font-weight:600}
.nav-item.on::before{content:"";position:absolute;right:-11px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--gold);border-radius:3px}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item .badge{margin-right:auto;background:var(--surface3);color:var(--ink2);font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px}
.nav-item.on .badge{background:#fff;color:var(--gold-d)}

.sb-user{padding:12px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:11px}
.sb-user .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sb-user .ui{flex:1;min-width:0}
.sb-user .un{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .ur{font-size:11px;color:var(--ink2)}
.sb-user .out{color:var(--ink3);padding:7px;border-radius:9px;transition:.15s}
.sb-user .out:hover{color:var(--bad);background:var(--bad-soft)}
.sb-user .out svg{width:17px;height:17px;display:block}

/* ============ MAIN ============ */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:66px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 26px;gap:16px;background:var(--surface)}
.topbar .pg-t{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:700}
.topbar .pg-s{font-size:12.5px;color:var(--ink2);margin-top:1px}
.topbar .sp{flex:1}
.role-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--line2)}
.rb-owner{color:var(--gold-d);background:var(--gold-soft);border-color:#e8d4a8}
.rb-editor{color:var(--info);background:var(--info-soft);border-color:#c9dcf0}
.rb-viewer{color:var(--ink2);background:var(--surface3)}
.rb-admin{color:var(--rose-d);background:var(--rose-soft);border-color:#f0cdd2}
.content{flex:1;overflow-y:auto;padding:26px}
.view{max-width:1080px;margin:0 auto;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* greeting */
.greet{margin-bottom:22px}
.greet .hello{font-family:'Frank Ruhl Libre',serif;font-size:27px;font-weight:700}
.greet .hello .wave{display:inline-block;animation:wave 2s ease infinite;transform-origin:70% 70%}
@keyframes wave{0%,60%,100%{transform:rotate(0)}10%,30%{transform:rotate(14deg)}20%{transform:rotate(-8deg)}}
.greet .tag{color:var(--ink2);font-size:14.5px;margin-top:3px}
.countdown{display:inline-flex;align-items:center;gap:8px;background:var(--gold-soft);border:1px solid #ecd9ad;border-radius:30px;padding:6px 15px;font-weight:700;color:var(--gold-d);font-size:13.5px;margin-top:12px}

/* ============ COMPONENTS ============ */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--line2);color:var(--ink);padding:9px 15px;border-radius:11px;font-weight:600;font-size:13.5px;transition:.15s;box-shadow:var(--sh)}
.btn:hover{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-d)}
.btn svg{width:16px;height:16px}
.btn-gold{background:var(--gold-grad);color:#fff;border:none;box-shadow:var(--sh-gold)}
.btn-gold:hover{filter:brightness(1.05);color:#fff;transform:translateY(-1px)}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.btn-ghost{background:none;border:1px solid transparent;box-shadow:none}
.btn-ghost:hover{background:var(--gold-soft);border-color:var(--line)}

.cards{display:grid;gap:15px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:17px;padding:18px;box-shadow:var(--sh);transition:.16s}
.stat:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.stat .ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.stat .ic svg{width:21px;height:21px}
.stat .v{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:34px;line-height:1;color:var(--ink)}
.stat .l{color:var(--ink2);font-size:13px;font-weight:500;margin-top:5px}
.stat .sub{font-size:11.5px;color:var(--ink3);margin-top:7px}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:21px;box-shadow:var(--sh)}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.panel-h .t{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;display:flex;align-items:center}
.panel-h .t svg{width:18px;height:18px;color:var(--gold);margin-left:8px}

.progress{height:10px;background:var(--surface3);border-radius:10px;overflow:hidden;display:flex}
.progress > span{height:100%}

table.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:right;font-size:11px;letter-spacing:.04em;color:var(--ink3);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);text-transform:uppercase}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13.5px}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:.12s}
.tbl tbody tr:hover td{background:var(--surface2)}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:600}
.p-ok{color:var(--ok);background:var(--ok-soft)}
.p-warn{color:var(--warn);background:var(--warn-soft)}
.p-bad{color:var(--bad);background:var(--bad-soft)}
.p-mut{color:var(--ink2);background:var(--surface3)}
.p-info{color:var(--info);background:var(--info-soft)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.d-groom{background:var(--groom)}.d-bride{background:var(--bride)}.d-both{background:linear-gradient(90deg,var(--groom) 50%,var(--bride) 50%)}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-in{position:relative;flex:1;min-width:200px}
.search-in svg{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--ink3)}
.search-in input{width:100%;background:var(--surface);border:1.5px solid var(--line2);border-radius:12px;padding:11px 38px 11px 12px;color:var(--ink);font-size:14px;outline:none;transition:.15s;box-shadow:var(--sh)}
.search-in input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
.fbtn{background:var(--surface);border:1.5px solid var(--line2);border-radius:11px;padding:9px 13px;font-size:13px;color:var(--ink2);font-weight:600;transition:.15s;box-shadow:var(--sh)}
.fbtn:hover{border-color:var(--gold);color:var(--ink)}
.fbtn.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold-d)}

.empty-state{text-align:center;color:var(--ink2);padding:50px 20px;line-height:1.7}
.empty-state svg{width:44px;height:44px;color:var(--line2);margin-bottom:12px}
.empty-state .es-t{font-family:'Frank Ruhl Libre',serif;font-size:18px;color:var(--ink);margin-bottom:5px;font-weight:700}

/* Seating map */
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:12px}
.seat-t{background:var(--surface);border:1.5px solid var(--line);border-radius:15px;padding:14px 8px 11px;text-align:center;cursor:pointer;transition:.15s;position:relative;box-shadow:var(--sh)}
.seat-t:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--sh2)}
.seat-t.empty-t{opacity:.5;background:var(--surface2)}
.seat-t.hl{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
.seat-t .sd{position:absolute;top:9px;left:9px;width:8px;height:8px;border-radius:50%}
.seat-t .tn{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:27px;color:var(--gold);line-height:1}
.seat-t .tl{font-size:8px;letter-spacing:.12em;color:var(--ink3);font-weight:700}
.seat-t .cap{font-size:11px;color:var(--ink2);font-weight:600;margin-top:6px}
.cap-bar{height:5px;background:var(--surface3);border-radius:5px;margin-top:6px;overflow:hidden}
.cap-bar > span{display:block;height:100%;background:var(--gold)}

.reveal-box{background:linear-gradient(165deg,#fff,var(--gold-soft));border:1.5px solid var(--gold);border-radius:20px;padding:24px;text-align:center;margin-bottom:16px;animation:pop .3s ease;box-shadow:var(--sh2)}
.reveal-box .rg{font-size:13px;color:var(--ink2)}
.reveal-box .rg b{color:var(--ink);display:block;font-size:17px;margin-top:2px}
.reveal-box .rn{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:70px;color:var(--gold);line-height:.95;margin:8px 0 2px}
.reveal-box .rl{font-size:10px;letter-spacing:.3em;color:var(--gold-d);font-weight:700}

/* Modal */
.modal-scrim{position:fixed;inset:0;background:rgba(60,48,30,.32);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.modal-scrim.on{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:450px;transform:scale(.95);transition:.2s;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-scrim.on .modal{transform:scale(1)}
.modal-h{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-h .x{color:var(--ink3);font-size:20px;padding:4px;border-radius:8px}
.modal-h .x:hover{background:var(--surface3);color:var(--ink)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--surface2);border:1.5px solid var(--line2);border-radius:11px;padding:10px 12px;color:var(--ink);font-size:14px;outline:none;transition:.15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);background:var(--surface);box-shadow:0 0 0 3px var(--gold-soft)}
.fld-row{display:flex;gap:11px}.fld-row > *{flex:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);border:none;color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:14px;z-index:300;opacity:0;transition:.25s;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--gold-b);vertical-align:-3px;margin-left:6px}

/* Sub-tabs */
.subtabs{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:16px;gap:3px;box-shadow:var(--sh)}
.subtab{padding:9px 17px;border-radius:9px;font-weight:600;font-size:13px;color:var(--ink2);transition:.15s}
.subtab.on{background:var(--gold-grad);color:#fff;box-shadow:var(--sh-gold)}
.subtab:hover:not(.on){color:var(--ink);background:var(--surface3)}

/* Hall editor (light) */
.hall-wrap{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--sh)}
.hall-bar{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.hall-bar .hint{color:var(--ink3);font-size:12px;margin-right:auto}
.hall-canvas{position:relative;width:100%;height:600px;border-radius:16px;
  background:
   linear-gradient(rgba(187,138,48,.05) 1px,transparent 1px) 0 0/100% 30px,
   linear-gradient(90deg,rgba(187,138,48,.05) 1px,transparent 1px) 0 0/30px 100%,
   linear-gradient(160deg,#fdfaf4,#f6efe3);
  border:1.5px solid var(--line2);overflow:hidden;touch-action:none;user-select:none}
.hall-stage{position:absolute;right:50%;transform:translateX(50%);top:3%;width:46%;height:6%;
  background:linear-gradient(180deg,var(--gold-soft),#fff);border:1.5px solid var(--gold);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.22em;color:var(--gold-d);font-weight:700;box-shadow:var(--sh)}
.hall-floor{position:absolute;right:50%;transform:translateX(50%);top:78%;width:40%;height:13%;
  background:repeating-linear-gradient(45deg,rgba(95,139,192,.05) 0 9px,transparent 9px 18px),var(--info-soft);
  border:1.5px dashed #b3cae6;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:11px;letter-spacing:.16em;color:var(--info);font-weight:700}
.htable{position:absolute;transform:translate(50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;

function fallbackCopy(txt){try{const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.top='-1000px';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');ta.remove();}catch(e){}}

function pickFile(accept,cb){const inp=document.createElement('input');inp.type='file';inp.accept=accept;inp.style.display='none';document.body.appendChild(inp);inp.onchange=()=>{if(inp.files&&inp.files[0])cb(inp.files[0]);inp.remove();};inp.click();}
function downscaleImage(file,max,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,max/Math.max(w,h));const cv=document.createElement('canvas');cv.width=Math.round(w*s);cv.height=Math.round(h*s);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);try{cb(cv.toDataURL('image/jpeg',0.72));}catch(e){cb(r.result);}};img.onerror=()=>cb(r.result);img.src=r.result;};r.readAsDataURL(file);}
function exportCSV(filename,rows){const csv='\ufeff'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');dlBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),filename);}
function exportXLSX(filename,aoa,sheet){if(!window.XLSX){exportCSV(filename.replace(/\.xlsx?$/,'.csv'),aoa);return;}const ws=XLSX.utils.aoa_to_sheet(aoa);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheet||'דוח');XLSX.writeFile(wb,filename);}
function dlBlob(blob,filename){try{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),3000);}catch(e){}}

:8px}.rc .nm{flex:1;font-weight:500}.mate{display:inline-block;background:#faf6ef;border:1px solid #eee5d6;border-radius:9px;padding:5px 11px;font-size:12.5px;margin:3px}.mh{font-size:11px;letter-spacing:.2em;color:#9a6c19;font-weight:700;margin:18px 0 8px}.ft{text-align:center;color:#a89d8c;font-size:11px;margin-top:26px}</style></head><body><div class="w"><div class="k">סידורי הושבה</div><h1>${esc(names[0]||e.names)}${names[1]?` <b>&</b> ${esc(names[1])}`:''}</h1><div class="o">✦ ✦ ✦</div><input id="q" placeholder="הקלידו את שמכם..." autocomplete="off"><div id="out"></div><div class="ft">מצאו את שולחנכם · עובד גם בלי אינטרנט</div></div><script>var D=${JSON.stringify(data)};var q=document.getElementById('q'),out=document.getElementById('out');function find(t){for(var i=0;i<D.length;i++)if(D[i].n===t)return D[i]}

 $$('[data-bd]').forEach(b2=>b2.onclick=()=>{DB.budget[DB.activeEvent]=budget().filter(x=>x.id!==b2.dataset.bd);commit();viewBudget(c);toast('נמחק');});}
function modalBudget(id,presetCat){const x=id?budget().find(b=>b.id===id):null;openModal(`<div class="modal-h">${x?'עריכת סעיף':'סעיף תקציב'}<button class="x" onclick="closeModal()">✕</button></div><div class="fld"><label>קטגוריה</label><input id="bCat" value="${x?esc(x.cat):esc(presetCat||'')}" placeholder="לדוגמה: אולם"></div><div class="fld-row"><div class="fld"><label>מתוכנן (₪)</label><input id="bPlan" type="number" value="${x?x.planned:''}"></div><div class="fld"><label>שולם (₪)</label><input id="bPaid" type="number" value="${x?x.paid:''}"></div></div><button class="btn btn-gold" style="width:100%" id="bSave">${svg(I.check)} ${x?'שמור':'הוסף'}</button>`);$('#bSave').onclick=()=>{const cat=$('#bCat').value.trim();if(!cat){toast('נא להזין קטגוריה');return;}const d={cat,planned:+$('#bPlan').value||0,paid:+$('#bPaid').value||0};if(x)Object.assign(x,d);else budget().push({id:'b'+Date.now(),...d});commit();closeModal();viewBudget($('#view'));toast(x?'עודכן':'נוסף');};if(presetCat)setTimeout(()=>{const p=$('#bPlan');if(p)p.focus();},50);}
/* ===== VENDORS ===== */
function viewVendors(c){const v=vendors();
 c.innerHTML=`<div class="toolbar"><div style="flex:1"></div>${can('edit')?`<button class="btn btn-gold" id="addV">${svg(I.plus)} ספק</button>`:''}</div>${v.length?`<div class="cards g2">${v.map(x=>`<div class="panel" style="padding:16px"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-weight:700;font-size:15.5px">${esc(x.name)}</div><div style="color:var(--ink2);font-size:12.5px;margin-top:2px">${esc(x.type)}</div></div><span class="pill ${x.status==='נחתם'?'p-ok':'p-warn'}">${esc(x.status)}</span></div><div style="display:flex;align-items:center;gap:10px;margin-top:12px"><div style="color:var(--ink2);font-size:13px;flex:1">${esc(x.phone||'—')}</div>${x.phone?`<button class="btn-ghost btn-sm" data-vcall="${x.id}">${svg(I.wa,'width:15px;height:15px')}</button>`:''}${can('edit')?`<button class="btn-ghost btn-sm" data-ve="${x.id}">${svg(I.edit,'width:15px;height:15px')}</button><button class="btn-ghost btn-sm" style="color:var(--bad)" data-vd="${x.id}">${svg(I.trash,'width:15px;height:15px')}</button>`:''}</div></div>`).join('')}</div>`:`<div class="empty-state">${svg(I.vendors)}<div class="es-t">אין ספקים עדיין</div><div>${can('edit')?'הוסיפו צלם, DJ, קייטרינג':''}</div></div>`}`;
 if($('#addV'))$('#addV').onclick=()=>modalVendor();
 $$('[data-ve]').forEach(b=>b.onclick=()=>modalVendor(b.dataset.ve));
 $$('[data-vd]').forEach(b=>b.onclick=()=>{DB.vendors[DB.activeEvent]=vendors().filter(x=>x.id!==b.dataset.vd);commit();viewVendors(c);toast('נמחק');});
 $$('[data-vcall]').forEach(b=>b.onclick=()=>{const x=vendors().find(v=>v.id===b.dataset.vcall);shareWANum(x.phone,'היי, לגבי האירוע של '+ev().names+'...');});}
function modalVendor(id){const x=id?vendors().find(v=>v.id===id):null;openModal(`<div class="modal-h">${x?'עריכת ספק':'ספק חדש'}<button class="x" onclick="closeModal()">✕</button></div><div class="fld"><label>שם הספק</label><input id="vName" value="${x?esc(x.name):''}"></div><div class="fld-row"><div class="fld"><label>תחום</label><input id="vType" value="${x?esc(x.type):''}" placeholder="צילום"></div><div class="fld"><label>טלפון</label><input id="vPhone" value="${x?esc(x.phone):''}"></div></div><div class="fld"><label>סטטוס</label><select id="vStatus"><option ${x&&x.status==='בתהליך'?'selected':''}>בתהליך</option><option ${x&&x.status==='נחתם'?'selected':''}>נחתם</option></select></div><button class="btn btn-gold" style="width:100%" id="vSave">${svg(I.check)} ${x?'שמור':'הוסף'}</button>`);$('#vSave').onclick=()=>{const name=$('#vName').value.trim();if(!name){toast('נא להזין שם');return;}const d={name,type:$('#vType').value.trim(),phone:$('#vPhone').value.trim(),status:$('#vStatus').value};if(x)Object.assign(x,d);else vendors().push({id:'v'+Date.now(),...d});commit();closeModal();viewVendors($('#view'));toast(x?'עודכן':'נוסף');};}
/* ===== TASKS ===== */
function viewTasks(c){const t=tasks();const done=t.filter(x=>x.done).length;const sugg=['לסגור אולם','לבחור צלם','להזמין DJ','לסגור קייטרינג','להזמין הזמנות','לתאם טעימות','לסדר הסעות','לבחור שמלה'];const have=t.map(x=>x.title);
 c.innerHTML=`<div class="toolbar">${t.length?`<span class="pill p-mut">${done}/${t.length} הושלמו</span>`:''}<div style="flex:1"></div>${can('edit')?`<button class="btn btn-gold" id="addT">${svg(I.plus)} משימה</button>`:''}</div>${can('edit')&&sugg.filter(s=>!have.includes(s)).length?`<div class="panel" style="margin-bottom:14px"><div class="panel-h"><div class="t">${svg(I.bolt)} הוספה מהירה</div></div><div style="display:flex;gap:8px;flex-wrap:wrap">${sugg.filter(s=>!have.includes(s)).slice(0,8).map(s=>`<button class="merge-chip" data-qt="${esc(s)}">${svg(I.plus,'width:12px;height:12px')} ${s}</button>`).join('')}</div></div>`:''}<div class="panel"><div id="taskList"></div></div>`;
 if($('#addT'))$('#addT').onclick=()=>modalTask();
 $$('[data-qt]').forEach(b=>b.onclick=()=>{tasks().push({id:'t'+Date.now(),title:b.dataset.qt,done:false,due:''});commit();viewTasks(c);renderNav();});
 renderTaskList();}
function renderTaskList(){const t=tasks().slice().sort((a,b)=>(a.done-b.done)||((a.due||'zz').localeCompare(b.due||'zz')));$('#taskList').innerHTML=t.length?t.map(x=>{const od=x.due&&!x.done&&daysTo(x.due)<0;return`<div style="display:flex;align-items:center;gap:13px;padding:12px 2px;border-bottom:1px solid var(--line)"><button class="tcheck" data-t="${x.id}" style="width:22px;height:22px;border-radius:7px;border:2px solid ${x.done?'var(--gold)':'var(--gold-d)'};background:${x.done?'var(--gold)':'transparent'};color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;${can('edit')?'':'pointer-events:none'}">${x.done?svg(I.check):''}</button><span style="flex:1;font-size:14.5px;${x.done?'color:var(--ink3);text-decoration:line-through':''}">${esc(x.title)}</span>${x.due?`<span class="pill ${od?'p-bad':'p-mut'}" style="font-size:11px">${od?'באיחור · ':''}${dateHe(x.due)}</span>`:''}${can('edit')?`<button class="btn-ghost btn-sm" data-te="${x.id}">${svg(I.edit,'width:14px;height:14px')}</button><button class="btn-ghost btn-sm" style="color:var(--bad)" data-td="${x.id}">${svg(I.trash,'width:14px;height:14px')}</button>`:''}</div>`;}).join(''):`<div class="empty-state">${svg(I.tasks)}<div class="es-t">אין משימות</div><div>${can('edit')?'הוסיפו או השתמשו בהוספה מהירה':''}</div></div>`;
 $$('.tcheck').forEach(b=>b.onclick=()=>{const x=tasks().find(t=>t.id===b.dataset.t);x.done=!x.done;commit();renderTaskList();renderNav();});
 $$('[data-te]').forEach(b=>b.onclick=()=>modalTask(b.dataset.te));
 $$('[data-td]').forEach(b=>b.onclick=()=>{DB.tasks[DB.activeEvent]=tasks().filter(x=>x.id!==b.dataset.td);commit();renderTaskList();renderNav();toast('נמחק');});}
function modalTask(id){const x=id?tasks().find(t=>t.id===id):null;openModal(`<div class="modal-h">${x?'עריכת משימה':'משימה חדשה'}<button class="x" onclick="closeModal()">✕</button></div><div class="fld"><label>תיאור</label><input id="tTitle" value="${x?esc(x.title):''}" placeholder="מה צריך לעשות?"></div><div class="fld"><label>תאריך יעד (אופציונלי)</label><input id="tDue" type="date" value="${x&&x.due?x.due:''}"></div><button class="btn btn-gold" style="width:100%" id="tSave">${svg(x?I.check:I.plus)} ${x?'שמור':'הוסף'}</button>`);$('#tSave').onclick=()=>{const title=$('#tTitle').value.trim();if(!title){toast('נא להזין תיאור');return;}const due=$('#tDue').value||'';if(x){x.title=title;x.due=due;}else tasks().push({id:'t'+Date.now(),title,done:false,due});commit();closeModal();renderTaskList();renderNav();toast(x?'עודכן':'נוסף');};}
/* ===== USERS ===== */
function viewUsers(c){const manage=can('users');const perms=[['view','צפייה'],['edit','עריכה'],['users','ניהול משתמשים'],['event','הגדרות אירוע'],['platform','כל האירועים']];
 c.innerHTML=`<div class="panel" style="margin-bottom:16px"><div class="panel-h"><div class="t">${svg(I.users)} צוות האירוע</div>${manage?`<button class="btn btn-gold btn-sm" id="addU">${svg(I.plus)} הזמן משתמש</button>`:''}</div><table class="tbl"><thead><tr><th>משתמש</th><th>תפקיד</th>${manage?'<th></th>':'<th>הרשאה</th>'}</tr></thead><tbody id="usersBody"></tbody></table></div><div class="panel"><div class="panel-h"><div class="t">${svg(I.lock)} מי יכול לעשות מה</div></div><table class="tbl"><thead><tr><th>הרשאה</th>${Object.values(ROLES).map(r=>`<th style="text-align:center">${r.label}</th>`).join('')}</tr></thead><tbody>${perms.map(([k,l])=>`<tr><td><b>${l}</b></td>${Object.values(ROLES).map(r=>`<td style="text-align:center">${r.perm.includes(k)?`<span style="color:var(--ok)">${svg(I.check,'width:15px;height:15px;display:inline')}</span>`:'<span style="color:var(--line2)">—</span>'}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
 renderUsersBody(manage);if($('#addU'))$('#addU').onclick=()=>modalUser();}
function renderUsersBody(manage){$('#usersBody').innerHTML=DB.users.map(u=>{const isMe=u.id===DB.me.id;return`<tr><td><div style="display:flex;align-items:center;gap:10px"><span style="width:34px;height:34px;border-radius:50%;background:${avc(u.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${initials(u.name)}</span><div><b>${esc(u.name)}</b>${isMe?' <span style="color:var(--gold-d);font-size:11px;font-weight:700">(אתה)</span>':''}<div style="color:var(--ink2);font-size:12px">${esc(u.email)}</div></div></div></td><td>${manage&&!isMe?`<select class="roleSel" data-u="${u.id}" style="background:var(--surface2);border:1.5px solid var(--line2);border-radius:9px;padding:6px 10px;color:var(--ink);font-weight:600;font-size:12.5px">${Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${u.role===k?'selected':''}>${r.label}</option>`).join('')}</select>`:`<span class="role-badge ${ROLES[u.role].badge}">${ROLES[u.role].label}</span>`}</td>${manage?`<td style="text-align:left">${!isMe?`<button class="btn-ghost btn-sm" style="color:var(--bad)" data-del="${u.id}">${svg(I.trash,'width:15px;height:15px')}</button>`:''}</td>`:`<td style="color:var(--ink2);font-size:12.5px">${ROLES[u.role].perm.includes('platform')?'גישה מלאה':ROLES[u.role].perm.includes('users')?'ניהול מלא':ROLES[u.role].perm.includes('edit')?'צפייה ועריכה':'צפייה בלבד'}</td>`}</tr>`;}).join('');
 $$('.roleSel').forEach(s=>s.onchange=()=>{const u=DB.users.find(x=>x.id===s.dataset.u);u.role=s.value;commit();toast(bname(u.name)+' → '+ROLES[s.value].label);renderUsersBody(true);});
 $$('[data-del]').forEach(b=>b.onclick=()=>{const u=DB.users.find(x=>x.id===b.dataset.del);if(confirm('להסיר את '+bname(u.name)+'?')){DB.users=DB.users.filter(x=>x.id!==b.dataset.del);commit();toast('הוסר');renderUsersBody(true);}});}
function modalUser(){openModal(`<div class="modal-h">הזמנת משתמש<button class="x" onclick="closeModal()">✕</button></div><div class="fld"><label>שם מלא</label><input id="uName"></div><div class="fld"><label>אימייל</label><input id="uEmail" type="email"></div><div class="fld"><label>תפקיד</label><select id="uRole">${Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${k==='editor'?'selected':''}>${r.label}</option>`).join('')}</select></div><button class="btn btn-gold" style="width:100%" id="uSave">${svg(I.send)} שלח הזמנה</button>`);$('#uSave').onclick=()=>{const name=$('#uName').value.trim(),email=$('#uEmail').value.trim();if(!name||!email){toast('מלאו שם ואימייל');return;}DB.users.push({id:'u'+Date.now(),name,email,pass:'1234',role:$('#uRole').value});commit();closeModal();renderUsersBody(true);toast('ההזמנה נשלחה ל‑'+name);};}
/* ===== SETTINGS ===== */
function viewSettings(c){const e=ev();const cp=coupleArr(e);
 c.innerHTML=`<div class="panel" style="max-width:560px"><div class="panel-h"><div class="t">${svg(I.settings)} פרטי האירוע</div></div><div class="fld-row"><div class="fld"><label>שם ראשון</label><input id="setN1" value="${esc(cp[0])}"></div><div class="fld"><label>שם שני</label><input id="setN2" value="${esc(cp[1])}"></div></div><div class="fld-row"><div class="fld"><label>תאריך</label><input id="setDate" type="date" value="${e.date}"></div><div class="fld"><label>סוג</label><input id="setType" value="${esc(e.type)}"></div></div><div class="fld"><label>מקום</label><input id="setVenue" value="${esc(e.venue)}"></div><div class="fld"><label>כתובת אתר (slug)</label><input id="setSlug" value="${esc(e.slug)}"></div><button class="btn btn-gold" id="saveSet">${svg(I.check)} שמור</button></div>
  <div class="panel" style="max-width:560px;margin-top:16px;border-color:#f0cdc8"><div class="panel-h"><div class="t" style="color:var(--bad)">אזור רגיש</div></div><p style="color:var(--ink2);font-size:13px;margin-bottom:12px">איפוס מוחק את כל השינויים ומחזיר את המערכת לנתוני נועה ומיכאל המקוריים.</p><button class="btn" style="border-color:#f0cdc8;color:var(--bad)" id="resetAll">${svg(I.trash)} אפס לנתוני ברירת מחדל</button></div>`;
 $('#saveSet').onclick=()=>{e.name1=$('#setN1').value.trim();e.name2=$('#setN2').value.trim();e.names=dispNames(e);e.date=$('#setDate').value;e.type=$('#setType').value;e.venue=$('#setVenue').value;e.slug=$('#setSlug').value.trim()||e.slug;commit();renderEventPick();nav('settings');toast('נשמר');};
 $('#resetAll').onclick=()=>{if(confirm('לאפס את כל הנתונים ולחזור לברירת המחדל?')){resetData();DB.activeEvent='e1';renderEventPick();renderNav();nav('dash');toast('המערכת אופסה');}};}
/* ===== MODALS + UTIL ===== */
const mScrim=$('#modalScrim'),mBox=$('#modal');
function openModal(h){mBox.innerHTML=h;mScrim.classList.add('on');}
function closeModal(){mScrim.classList.remove('on');}
mScrim.onclick=e=>{if(e.target===mScrim)closeModal();};
let toastT;function toast(msg){const t=$('#toast');t.innerHTML=svg(I.sparkle)+esc(msg);t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2600);}
function insertAtCursor(ta,text){const s=ta.selectionStart||ta.value.length,e=ta.selectionEnd||ta.value.length;ta.value=ta.value.slice(0,s)+text+ta.value.slice(e);ta.focus();ta.selectionStart=ta.selectionEnd=s+text.length;}
window.nav=nav;window.closeModal=closeModal;
$('#menuBtn').onclick=()=>{$('#sidebar').classList.add('open');$('#sbScrim').classList.add('on');};
function closeSb(){$('#sidebar').classList.remove('open');$('#sbScrim').classList.remove('on');}
$('#sbScrim').onclick=closeSb;
renderLogin();

</script>
</body>
